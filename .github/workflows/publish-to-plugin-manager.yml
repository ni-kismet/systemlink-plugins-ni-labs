name: Publish to Plugin Manager

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: Plugin directory name or package name to publish (blank = all)
        required: false
        type: string
  push:
    tags:
      - '*-v*.*.*'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: discover
        env:
          INPUT_PLUGIN: ${{ github.event.inputs.plugin || '' }}
          TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: |
          MATRIX=$(node scripts/list-plugins.mjs)
          COUNT=$(node -e "const items = JSON.parse(process.argv[1]); process.stdout.write(String(items.length));" "$MATRIX")
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Discovered $COUNT plugin(s): $MATRIX"

  build-and-submit:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    name: Publish ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Package plugin
        working-directory: ${{ matrix.path }}
        run: npm run package

      - name: Build thin submission manifest
        id: submission_manifest
        working-directory: ${{ matrix.path }}
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          MANIFEST_PATH=$(node ../../scripts/create-submission-manifest.mjs . --source-repo "${GITHUB_REPOSITORY}")
          echo "path=$MANIFEST_PATH" >> "$GITHUB_OUTPUT"

      - name: Locate artifacts
        id: artifacts
        working-directory: ${{ matrix.path }}
        run: |
          NIPKG_PATH=$(find dist/nipkg -maxdepth 1 -name '*.nipkg' | head -1)
          if [ -z "$NIPKG_PATH" ]; then
            echo 'No .nipkg artifact found' >&2
            exit 1
          fi
          echo "nipkg_path=$NIPKG_PATH" >> "$GITHUB_OUTPUT"
          echo "nipkg_name=$(basename "$NIPKG_PATH")" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ${{ matrix.path }}
        run: |
          if gh release view "${{ matrix.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ matrix.tag }}" "${{ steps.artifacts.outputs.nipkg_path }}" --clobber
          else
            gh release create "${{ matrix.tag }}" \
              "${{ steps.artifacts.outputs.nipkg_path }}" \
              --title "${{ matrix.displayName }} v${{ matrix.version }}" \
              --notes "Release of ${{ matrix.displayName }} v${{ matrix.version }}" \
              --latest=false
          fi

          for icon in icon.svg icon.png; do
            if [ -f "$icon" ]; then
              gh release upload "${{ matrix.tag }}" "$icon" --clobber
            fi
          done

      - name: Submit to Plugin Manager
        env:
          PLUGIN_MANAGER_TOKEN: ${{ secrets.PLUGIN_MANAGER_DISPATCH_TOKEN }}
          SOURCE_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ matrix.tag }}
          ARTIFACT_NAME: ${{ steps.artifacts.outputs.nipkg_name }}
        working-directory: ${{ matrix.path }}
        run: |
          MANIFEST=$(cat submission-manifest.json)

          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PLUGIN_MANAGER_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/ni-kismet/systemlink-plugin-manager/dispatches" \
            -d "$(jq -n \
              --arg event_type 'submit-app' \
              --argjson manifest "$MANIFEST" \
              --arg source_repo "$SOURCE_REPO" \
              --arg release_tag "$RELEASE_TAG" \
              --arg artifact_name "$ARTIFACT_NAME" \
              '{
                event_type: $event_type,
                client_payload: {
                  manifest: $manifest,
                  source_repo: $source_repo,
                  release_tag: $release_tag,
                  artifact_name: $artifact_name
                }
              }')"

          echo "Submitted ${{ matrix.package }} via repository_dispatch"

  nothing-to-publish:
    needs: discover
    if: needs.discover.outputs.count == '0'
    runs-on: ubuntu-latest
    steps:
      - run: echo 'No plugins matched the current workflow invocation.'
