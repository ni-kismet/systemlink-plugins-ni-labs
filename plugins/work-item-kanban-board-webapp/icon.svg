<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Kanban board icon">
    <rect width="128" height="128" rx="24" fill="#E8F0FE"/>
    <!-- Three kanban columns -->
    <rect x="14" y="24" width="28" height="80" rx="6" fill="#FFFDF7" stroke="#1F3B4D" stroke-width="4"/>
    <rect x="50" y="24" width="28" height="80" rx="6" fill="#FFFDF7" stroke="#1F3B4D" stroke-width="4"/>
    <rect x="86" y="24" width="28" height="80" rx="6" fill="#FFFDF7" stroke="#1F3B4D" stroke-width="4"/>
    <!-- Column header accents -->
    <rect x="14" y="24" width="28" height="12" rx="6" fill="#6b7280"/>
    <rect x="50" y="24" width="28" height="12" rx="6" fill="#10b981"/>
    <rect x="86" y="24" width="28" height="12" rx="6" fill="#6366f1"/>
    <!-- Cards in column 1 -->
    <rect x="18" y="42" width="20" height="10" rx="3" fill="#3b82f6" opacity="0.8"/>
    <rect x="18" y="56" width="20" height="10" rx="3" fill="#f59e0b" opacity="0.8"/>
    <rect x="18" y="70" width="20" height="10" rx="3" fill="#3b82f6" opacity="0.8"/>
    <!-- Cards in column 2 -->
    <rect x="54" y="42" width="20" height="10" rx="3" fill="#10b981" opacity="0.8"/>
    <rect x="54" y="56" width="20" height="10" rx="3" fill="#f97316" opacity="0.8"/>
    <!-- Cards in column 3 -->
    <rect x="90" y="42" width="20" height="10" rx="3" fill="#8b5cf6" opacity="0.8"/>
</svg>
